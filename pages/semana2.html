<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semana 2 — Ibarra Vargas Ricardo</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark:#0f0608; --bg-card:#1a0b0e; --accent:#8b1a2a;
      --accent2:#c0243a; --accent3:#e83a54;
      --text:#f0dde0; --text-muted:#9e7a80; --border:#3d1520;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Nunito',sans-serif; background-color:var(--bg-dark);
      color:var(--text); min-height:100vh;
      background-image:
        radial-gradient(ellipse at 10% 20%,rgba(139,26,42,0.15) 0%,transparent 50%),
        radial-gradient(ellipse at 90% 80%,rgba(139,26,42,0.10) 0%,transparent 50%);
    }
    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 2.5rem; height:60px; background:rgba(15,6,8,0.95);
      border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
      backdrop-filter:blur(10px);
    }
    .nav-brand {
      display:flex; align-items:center; gap:10px;
      font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1rem;
      color:var(--text); text-decoration:none;
    }
    .nav-logo-hex { width:30px; height:30px; }
    .nav-links { display:flex; gap:2rem; list-style:none; }
    .nav-links a {
      text-decoration:none; color:var(--text-muted);
      font-family:'Rajdhani',sans-serif; font-weight:600;
      font-size:0.9rem; letter-spacing:1px; text-transform:uppercase; transition:color 0.2s;
    }
    .nav-links a:hover { color:var(--accent3); }
    main { max-width:860px; margin:0 auto; padding:3rem 2rem 4rem; }
    .hero-semana {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:20px; padding:2.5rem 2rem; text-align:center;
      position:relative; overflow:hidden; margin-bottom:3rem;
      box-shadow:0 0 40px rgba(139,26,42,0.15); animation:fadeIn 0.6s ease;
    }
    .hero-semana::before {
      content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,transparent,var(--accent2),#a855f7,transparent);
    }
    .hero-icon { font-size:3rem; margin-bottom:1rem; display:block; }
    .hero-semana h1 {
      font-family:'Rajdhani',sans-serif; font-size:1.8rem; font-weight:700;
      letter-spacing:3px; color:var(--text); text-transform:uppercase; margin-bottom:0.5rem;
    }
    .hero-semana p { color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem; }
    .btn-github {
      display:inline-flex; align-items:center; gap:8px;
      background:linear-gradient(135deg,#06b6d4,#0891b2);
      color:#fff; border:none; padding:0.7rem 1.6rem; border-radius:8px;
      font-family:'Rajdhani',sans-serif; font-weight:700; font-size:0.95rem;
      letter-spacing:1px; cursor:pointer; text-decoration:none;
      box-shadow:0 4px 20px rgba(6,182,212,0.35); transition:all 0.2s;
    }
    .btn-github:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(6,182,212,0.5); }
    .pdf-section { margin-bottom:2.5rem; animation:fadeIn 0.5s ease; }
    .pdf-section-header { display:flex; align-items:center; gap:10px; margin-bottom:0.4rem; }
    .pdf-folder { font-size:1.4rem; }
    .pdf-section-title {
      font-family:'Rajdhani',sans-serif; font-size:1.15rem; font-weight:700;
      color:var(--text); letter-spacing:1px;
    }
    .pdf-section-desc { color:var(--text-muted); font-size:0.85rem; margin-bottom:0.8rem; }
    .pdf-embed-wrapper {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.3);
    }
    .pdf-embed-wrapper iframe { width:100%; height:520px; border:none; display:block; }
    .back-center { text-align:center; margin-top:2.5rem; }
    .back-link {
      color:var(--accent3); text-decoration:none;
      font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:1px; transition:color 0.2s;
    }
    .back-link:hover { color:#ff6b82; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="../index.html">
      <svg class="nav-logo-hex" viewBox="0 0 40 46" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,1 38,11 38,35 20,45 2,35 2,11" fill="#1565c0" stroke="#1e88e5" stroke-width="1.5"/>
        <text x="20" y="29" font-family="Rajdhani,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">IV</text>
      </svg>
      Ibarra Vargas Ricardo
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="../index.html">Tareas</a></li>
      <li><a href="../index.html">Perfil</a></li>
      <li><a href="../index.html">Información</a></li>
    </ul>
  </nav>

  <main>
    <div class="hero-semana">
      <span class="hero-icon">📝</span>
      <h1>Semana 2: Métodos</h1>
      <p>Gestión inicial del proyecto y configuración del entorno de desarrollo.</p>
      <a class="btn-github" href="https://github.com/TU_USUARIO/TU_REPO/tree/main/pages/semana2" target="_blank">
        🌐 Ver carpeta en GitHub
      </a>
    </div>

    <div class="pdf-section">
      <div class="pdf-section-header">
        <span class="pdf-folder">📁</span>
        <span class="pdf-section-title">Actividad Semana 2</span>
      </div>
      <p class="pdf-section-desc">Lee el informe directamente aquí abajo:</p>
      <div class="pdf-embed-wrapper">
        <iframe src="semana2/SEMANA2_METODOS_IbarraVargasRicardo.pdf" title="Semana 2 Métodos"></iframe>
      </div>
    </div>

    <div class="back-center">
      <a class="back-link" href="../index.html">← Volver al Inicio</a>
    </div>
  </main>
</body>
</html>
